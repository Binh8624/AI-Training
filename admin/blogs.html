<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Blog | AI Training Admin</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <i class="bi bi-cpu-fill"></i>
            <h2>AI Training</h2>
            <span>ADMIN</span>
        </div>

        <ul class="menu">

            <li>
                <a href="dashboard.html">
                    <i class="bi bi-speedometer2"></i>
                    Dashboard
                </a>
            </li>

            <li class="active">
                <a href="blogs.html">
                    <i class="bi bi-file-earmark-text"></i>
                    Quản lý Blog
                </a>
            </li>

            <li>
                <a href="courses.html">
                    <i class="bi bi-mortarboard"></i>
                    Quản lý khóa học
                </a>
            </li>

            <li data-admin-only>
                <a href="users.html">
                    <i class="bi bi-people"></i>
                    Người dùng
                </a>
            </li>

            <li>
                <a href="comments.html">
                    <i class="bi bi-chat-dots"></i>
                    Bình luận
                </a>
            </li>

            <li>
                <a href="stats.html">
                    <i class="bi bi-graph-up-arrow"></i>
                    Thống kê
                </a>
            </li>

            <li data-admin-only>
                <a href="settings.html">
                    <i class="bi bi-gear"></i>
                    Cài đặt
                </a>
            </li>

            <li>
                <a href="#" data-logout>
                    <i class="bi bi-box-arrow-right"></i>
                    Đăng xuất
                </a>
            </li>

        </ul>

    </aside>

    <!-- Content -->
    <main class="content">

        <!-- Topbar -->
        <div class="topbar">

            <div>
                <h1>Quản lý Blog</h1>
                <p>Quản lý các bài viết của AI Training</p>
            </div>

            <div class="topbar-right">

                <button class="icon-btn">
                    <i class="bi bi-bell"></i>
                    <span class="badge-notify">3</span>
                </button>

                <div class="user-box">
                    <img src="https://i.pravatar.cc/100" alt="">
                    <div>
                        <strong data-user-name>Bắc</strong>
                        <p data-user-role>Administrator</p>
                    </div>
                </div>

            </div>

        </div>

        <!-- Card -->
        <div class="dashboard-box">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h4>Danh sách Blog</h4>

                <button id="btnAdd" class="btn btn-primary">

                    <i class="bi bi-plus-circle"></i>

                    Thêm Blog

                </button>

            </div>

            <!-- Search -->

            <div class="mb-4">

                <input
                    id="txtSearch"
                    type="text"
                    class="form-control"
                    placeholder="Tìm kiếm theo tiêu đề hoặc tác giả...">

            </div>

            <!-- Table -->

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Ảnh</th>

                            <th>Tiêu đề</th>

                            <th>Tác giả</th>

                            <th>Ngày tạo</th>

                            <th width="160">Thao tác</th>

                        </tr>

                    </thead>

                    <tbody id="blogTableBody">

                        <!-- JavaScript render -->

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<!-- Modal -->

<div class="modal fade" id="blogModal" tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Thông tin Blog

                </h5>

                <button class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <div class="row">

                    <div class="col-12 mb-3">

                        <label class="form-label">

                            Tiêu đề

                        </label>

                        <input
                            id="title"
                            class="form-control"
                            type="text">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Tác giả

                        </label>

                        <input
                            id="author"
                            class="form-control"
                            type="text">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Link ảnh

                        </label>

                        <input
                            id="image"
                            class="form-control"
                            type="text">

                    </div>

                    <div class="col-12 mb-3">

                        <img
                            id="imgPreview"
                            class="img-fluid rounded border"
                            src="https://placehold.co/900x400?text=Preview">

                    </div>

                    <div class="col-12">

                        <label class="form-label">

                            Nội dung

                        </label>

                        <textarea
                            id="content"
                            rows="8"
                            class="form-control"></textarea>

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Hủy

                </button>

                <button
                    id="btnSave"
                    class="btn btn-primary">

                    Lưu Blog

                </button>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Auth guard -->

<script type="module">
    import { requireAuth, renderUserBox, bindLogout } from "./js/auth.js";

    const user = requireAuth();
    if (user) {
        renderUserBox(user);
        bindLogout();
    }
</script>

<!-- Blog JS -->

<script type="module" src="js/blog.js"></script>

</body>

</html>
