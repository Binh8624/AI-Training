<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | AI Training Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/admin.css">

    <style>
        body.login-body {
            font-family: "Poppins", "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 20% 20%, rgba(79, 70, 229, .35), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(14, 165, 233, .3), transparent 45%),
                var(--sidebar);
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 40px 34px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .login-logo i {
            font-size: 26px;
            color: var(--primary);
        }

        .login-logo h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }

        .login-sub {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .demo-box {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 12.5px;
            color: #475569;
            margin-top: 18px;
        }

        .login-error {
            display: none;
            color: var(--danger);
            font-size: 13.5px;
            margin-top: 10px;
        }
    </style>
</head>

<body class="login-body">

    <div class="login-card">

        <div class="login-logo">
            <i class="bi bi-cpu-fill"></i>
            <h1>AI Training</h1>
        </div>
        <p class="login-sub">Đăng nhập vào trang quản trị</p>

        <form id="loginForm" novalidate>

            <div class="mb-3">
                <label class="form-label">Tài khoản</label>
                <input id="username" type="text" class="form-control" placeholder="admin" autocomplete="username">
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input id="password" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i>
                Đăng nhập
            </button>

            <p id="loginError" class="login-error">
                Sai tài khoản hoặc mật khẩu.
            </p>

        </form>

        <div class="demo-box">
            <strong>Tài khoản demo (chỉ nhân sự nội bộ):</strong><br>
            Admin (toàn quyền): <code>admin / admin123</code><br>
            Staff (quyền hạn chế): <code>staff / staff123</code><br>
            <span style="color:#94a3b8">
                Lưu ý: đây là trang quản trị nội bộ, tài khoản học viên/khách của website
                không đăng nhập được ở đây.
            </span>
        </div>

    </div>

    <script type="module">
        import { DEMO_ACCOUNTS, setCurrentUser, getCurrentUser } from "./js/auth.js";

        // Nếu đã đăng nhập rồi thì vào thẳng dashboard
        if (getCurrentUser()) {
            window.location.href = "dashboard.html";
        }

        const form = document.getElementById("loginForm");
        const errorBox = document.getElementById("loginError");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            const account = DEMO_ACCOUNTS.find(
                (acc) => acc.username === username && acc.password === password
            );

            if (!account) {
                errorBox.style.display = "block";
                return;
            }

            errorBox.style.display = "none";

            setCurrentUser({
                username: account.username,
                name: account.name,
                role: account.role
            });

            window.location.href = "dashboard.html";
        });
    </script>

</body>

</html>
